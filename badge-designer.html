<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeHeroes — Badge Designer</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f0; font-family: system-ui, sans-serif; padding: 40px; color: #1a1a1a; }
h1 { font-size: 24px; margin-bottom: 30px; }
.grid { display: flex; gap: 40px; flex-wrap: wrap; margin-bottom: 40px; }
.card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; width: 200px; }
.card h3 { margin-top: 12px; font-size: 14px; }
.card .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 4px; }
.controls { margin: 30px 0; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.controls button { padding: 8px 20px; border-radius: 10px; border: none; background: #00A889; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
.controls button:hover { background: #008F78; }
canvas { border-radius: 16px; }
</style>
</head>
<body>
<h1>🎨 TimeHeroes — Design de badges</h1>
<p style="margin-bottom:20px;color:#666;">Génération de 4 badges par rareté. Appuie sur "Tout exporter" pour sauvegarder.</p>

<div class="controls">
  <button onclick="exportAll()">📥 Tout exporter en PNG</button>
  <button onclick="randomize()">🎲 Randomiser les seed</button>
  <span id="status" style="font-size:13px;color:#888;"></span>
</div>

<div id="canvas-container"></div>
<div class="grid" id="badge-list"></div>

<script>
// ─── Rarity config ────────────────────────────────────────────────────
const RARITIES = [
  { key: 'COMMUN',  label: 'COMMUN',  color: '#6B7280', border: '#9CA3AF', name: 'Premier Pas' },
  { key: 'RARE',    label: 'RARE',    color: '#047857', border: '#059669', name: 'Gardien du Quartier' },
  { key: 'ÉPIQUE',  label: 'ÉPIQUE',  color: '#6D28D9', border: '#7C3AED', name: 'Pilier du Quartier' },
  { key: 'LÉGENDAIRE', label: 'LÉGENDAIRE', color: '#92400E', border: '#D97706', name: 'Champion' },
];

const ICONS = ['star', 'heart', 'shield', 'trophy'];
let seed = 42;

// ─── p5 badge renderer ────────────────────────────────────────────────
function drawBadge(p, w, rarity, icon, earned) {
  const c = RARITIES.find(r => r.key === rarity);
  const cx = w/2, cy = w/2;
  const s = w/72; // scale factor

  p.push();
  p.translate(cx, cy);
  p.scale(s);

  // Glow
  if (earned) {
    p.drawingContext.shadowColor = c.border + '66';
    p.drawingContext.shadowBlur = 12;
  }

  // ── Shape path ─────────────────────────────────────────────────────
  const shapePath = (rarity === 'COMMUN')
    ? octagonPath(w/s)
    : shieldPath(w/s);

  // Outer border gradient
  p.noStroke();
  const borderGrad = p.drawingContext.createLinearGradient(-32, -32, 32, 32);
  borderGrad.addColorStop(0, earned ? c.border : '#D1D5DB');
  borderGrad.addColorStop(1, earned ? darken(c.border, 30) : '#9CA3AF');
  p.drawingContext.fillStyle = borderGrad;
  p.beginShape();
  shapePath.forEach(pt => p.vertex(pt.x, pt.y));
  p.endShape(p.CLOSE);
  p.drawingContext.shadowBlur = 0;

  // Inner body
  const inset = 2.5;
  const innerPath = rarity === 'COMMUN'
    ? octagonPath(w/s, inset)
    : shieldPath(w/s, inset);

  const bodyGrad = p.drawingContext.createLinearGradient(0, -28, 0, 28);
  if (earned) {
    bodyGrad.addColorStop(0, lighten(c.color, 80));
    bodyGrad.addColorStop(0.5, lighten(c.color, 70));
    bodyGrad.addColorStop(1, lighten(c.color, 50));
  } else {
    bodyGrad.addColorStop(0, '#F9FAFB');
    bodyGrad.addColorStop(1, '#E5E7EB');
  }
  p.drawingContext.fillStyle = bodyGrad;
  p.beginShape();
  innerPath.forEach(pt => p.vertex(pt.x, pt.y));
  p.endShape(p.CLOSE);

  // Sheen
  p.blendMode(p.SCREEN);
  const sheenGrad = p.drawingContext.createLinearGradient(0, -28, 0, 10);
  sheenGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
  sheenGrad.addColorStop(1, 'rgba(255,255,255,0)');
  p.drawingContext.fillStyle = sheenGrad;
  p.beginShape();
  innerPath.forEach(pt => p.vertex(pt.x, pt.y));
  p.endShape(p.CLOSE);
  p.blendMode(p.BLEND);

  // Inner rim ring
  p.noFill();
  p.stroke(earned ? c.border + '40' : '#D1D5DB40');
  p.strokeWeight(0.6);
  p.beginShape();
  const rimPath = rarity === 'COMMUN'
    ? octagonPath(w/s, 6)
    : shieldPath(w/s, 6);
  rimPath.forEach(pt => p.vertex(pt.x, pt.y));
  p.endShape(p.CLOSE);

  // ── Icon circle ────────────────────────────────────────────────────
  const icR = 14;
  p.noStroke();
  const icGrad = p.drawingContext.createRadialGradient(-3, -4, 1, 0, 0, icR);
  icGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
  icGrad.addColorStop(1, earned ? '#ffffff' : '#E5E7EB');
  p.drawingContext.fillStyle = icGrad;
  p.ellipse(0, 0, icR * 2);

  // Icon shadow
  p.drawingContext.shadowColor = 'rgba(0,0,0,0.08)';
  p.drawingContext.shadowBlur = 3;
  p.drawingContext.shadowOffsetY = 1;

  // Draw icon
  p.fill(earned ? c.color : '#D1D5DB');
  p.noStroke();
  p.textAlign(p.CENTER, p.CENTER);
  p.textSize(16);
  p.text(iconToEmoji(icon), 0, 1);
  p.drawingContext.shadowBlur = 0;
  p.drawingContext.shadowOffsetY = 0;

  // ── Rarity decorations ────────────────────────────────────────────
  if (earned && rarity === 'RARE') {
    p.fill('#FCD34D');
    p.noStroke();
    p.circle(-14, -14, 3);
    p.circle(14, -14, 3);
    p.circle(0, 18, 3);
  }
  if (earned && rarity === 'ÉPIQUE') {
    p.fill('#C4B5FD');
    p.noStroke();
    p.circle(-15, -12, 2);
    p.circle(13, -14, 2.5);
    p.circle(-10, 16, 2);
  }
  if (earned && rarity === 'LÉGENDAIRE') {
    // Crown
    p.fill('#B45309');
    p.noStroke();
    p.triangle(-7, -20, 0, -26, 7, -20);
    p.rect(-7, -22, 14, 3);
    p.fill('#FEF3C7');
    p.circle(-4, -22, 2);
    p.circle(0, -24, 2);
    p.circle(4, -22, 2);
    // Sparkles
    p.fill('#FCD34D');
    p.circle(-17, -9, 2);
    p.circle(17, -5, 1.5);
  }

  p.pop();
}

// ─── Shape generators ─────────────────────────────────────────────────
function octagonPath(size, inset = 0) {
  const r = size/2 - inset;
  const pts = [];
  for (let i = 0; i < 8; i++) {
    const angle = i * PI/4 - PI/8;
    pts.push({ x: cos(angle) * r, y: sin(angle) * r });
  }
  return pts;
}

function shieldPath(size, inset = 0) {
  const s = size/2 - inset;
  const pts = [];
  const segments = 20;
  const sh = [
    [0, -s],      // top center
    [-0.35*s, -0.9*s],
    [-0.7*s, -0.7*s],
    [-0.9*s, -0.35*s],
    [-s, 0],
    [-0.85*s, 0.4*s],
    [-0.6*s, 0.7*s],
    [-0.3*s, 0.9*s],
    [0, s],       // bottom point
    [0.3*s, 0.9*s],
    [0.6*s, 0.7*s],
    [0.85*s, 0.4*s],
    [s, 0],
    [0.9*s, -0.35*s],
    [0.7*s, -0.7*s],
    [0.35*s, -0.9*s],
  ];
  return sh.map(([x, y]) => ({ x, y }));
}

// ─── Helpers ───────────────────────────────────────────────────────────
function darken(hex, amt) {
  let c = hexToRgb(hex);
  return rgbToHex(Math.max(c.r-amt,0), Math.max(c.g-amt,0), Math.max(c.b-amt,0));
}
function lighten(hex, amt) {
  let c = hexToRgb(hex);
  return rgbToHex(Math.min(c.r+amt,255), Math.min(c.g+amt,255), Math.min(c.b+amt,255));
}
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(x => Math.round(x).toString(16).padStart(2,'0')).join('');
}
function iconToEmoji(icon) {
  return { star: '⭐', heart: '❤️', shield: '🛡️', trophy: '🏆', people: '👥', target: '🎯' }[icon] || '⭐';
}

// ─── p5 sketch ────────────────────────────────────────────────────────
let badgeImages = {};

const sketch = (p) => {
  p.setup = () => {
    let container = document.getElementById('canvas-container');
    p.createCanvas(800, 300);
    p.pixelDensity(2);
    container.appendChild(p.canvas);
    p.noLoop();
    renderAll();
  };

  p.draw = () => {};
};

function renderAll() {
  let p = window._p5Instance;
  if (!p) return;
  const p5 = p;
  p5.clear();
  p5.randomSeed(seed);
  p5.background(245, 245, 240);
  p5.drawingContext.shadowColor = 'transparent';
  p5.drawingContext.shadowBlur = 0;

  const bw = 180;
  const gap = 16;
  const startX = 20;

  RARITIES.forEach((rarity, i) => {
    const x = startX + i * (bw + gap);
    const y = 20;

    // Label
    p5.fill('#1a1a1a');
    p5.noStroke();
    p5.textAlign(p5.CENTER, p5.TOP);
    p5.textSize(11);
    p5.textStyle(p5.BOLD);
    p5.text(rarity.key, x + bw/2, y + bw + 8);
    p5.textStyle(p5.NORMAL);
    p5.textSize(9);
    p5.fill('#888');
    p5.text(rarity.name, x + bw/2, y + bw + 22);

    // Draw earned badge
    p5.push();
    p5.translate(x + bw/2 - 72/2, y);
    drawBadge(p5, 72, rarity.key, ICONS[i], true);
    p5.pop();

    // Draw locked badge
    p5.push();
    p5.translate(x + bw/2 + 72/2 + 8, y);
    drawBadge(p5, 72, rarity.key, ICONS[i], false);
    p5.pop();

    // Caption
    p5.fill('#999');
    p5.textSize(8);
    p5.textAlign(p5.CENTER, p5.TOP);
    p5.text('Débloqué', x + bw/2 - 72/2 + 36, y + bw + 36);
    p5.text('Verrouillé', x + bw/2 + 72/2 + 8 + 36, y + bw + 36);
  });
}

function exportAll() {
  const p = window._p5Instance;
  if (!p) return;
  renderAll();
  p.saveCanvas('timeheroes-badges', 'png');
  document.getElementById('status').textContent = '✅ Exporté !';
  setTimeout(() => document.getElementById('status').textContent = '', 2000);
}

function randomize() {
  seed = Math.floor(Math.random() * 99999);
  renderAll();
  document.getElementById('status').textContent = `🎲 Seed: ${seed}`;
}

// ─── Init ──────────────────────────────────────────────────────────────
new p5(sketch, 'canvas-container');
window._p5Instance = null;
// Store p5 instance
const origSetup = sketch;
</script>
</body>
</html>
